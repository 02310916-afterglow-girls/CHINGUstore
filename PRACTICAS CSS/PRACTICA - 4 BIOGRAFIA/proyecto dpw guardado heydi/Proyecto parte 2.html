<!-- Bootstrap -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<title>Formulario Decorado</title>

<style>

body{
    background-image: url('imagen/tienda kpop.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: Arial, Helvetica, sans-serif;
}

/* Caja del formulario */
.formulario{
    background: rgba(255,255,255,0.85);
    padding: 30px;
    margin-top: 40px;
    border-radius: 20px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
}

/* Título */
.titulo{
    text-align: center;
    color: red;
    font-size: 30px;
    margin-bottom: 20px;
}

/* Navbar */
.navbar{
    box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
}

/* Botón */
.btn-primary{
    width: 100%;
    border-radius: 30px;
    font-size: 18px;
    transition: 0.3s;
}

.btn-primary:hover{
    background: #28a745;
    transform: scale(1.05);
}

</style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 formulario">

      <h2 class="titulo"><b>PEDIDOS AGREGUE SUS DATOS</b></h2>

      <form>

        <div class="form-row">

          <div class="form-group col-md-6">
            <label>Correo</label>
            <input type="email" class="form-control">
          </div>

          <div class="form-group col-md-6">
            <label>Coloque su contrasena</label>
            <input type="password" class="form-control">
          </div>

        </div>

        <div class="form-group">
          <label>Direccion</label>
          <input type="text" class="form-control" placeholder="Esbribe aqui">
        </div>

        <div class="form-group">
          <label>Direccion 2</label>
          <input type="text" class="form-control" placeholder="Escribe aqui">
        </div>

        <div class="form-row">

          <div class="form-group col-md-6">
            <label>Ciudad</label>
            <input type="text" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Estado</label>
            <select class="form-control">
              <option selected>Escoge...</option>
              <option>Baja California</option>
              <option>Sonora</option>
              <option>Jalisco</option>
              <option>Tijuana</option>
              <option>Mexicali</option>
              <option>Ensena</option>
              <option>Rosarito</option>
              <option>Cancun</option>
              <option>Ciudad de Mexico</option>
            </select>
          </div>

          <div class="form-group col-md-2">
            <label>Codigo Postal</label>
            <input type="text" class="form-control">
          </div>

        </div>

        <div class="form-group">
          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">
              Activar
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          Enviar Datos
        </button>

      </form>

    </div>
  </div>
</div>
